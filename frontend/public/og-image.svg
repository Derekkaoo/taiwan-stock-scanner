<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- background -->
  <rect width="1200" height="630" fill="#0a0e17"/>

  <!-- subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e2d4a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0e17" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- candlestick cluster on right -->
  <g transform="translate(720, 160)">
    <!-- candle 1: red up -->
    <g>
      <line x1="20" y1="60" x2="20" y2="280" stroke="#ef4444" stroke-width="2"/>
      <rect x="8" y="120" width="24" height="130" fill="#ef4444"/>
    </g>
    <!-- candle 2: red up stronger -->
    <g transform="translate(60,0)">
      <line x1="20" y1="30" x2="20" y2="260" stroke="#ef4444" stroke-width="2"/>
      <rect x="8" y="60" width="24" height="180" fill="#ef4444"/>
    </g>
    <!-- candle 3: green down -->
    <g transform="translate(120,0)">
      <line x1="20" y1="50" x2="20" y2="240" stroke="#22c55e" stroke-width="2"/>
      <rect x="8" y="100" width="24" height="110" fill="#22c55e"/>
    </g>
    <!-- candle 4: red up -->
    <g transform="translate(180,0)">
      <line x1="20" y1="10" x2="20" y2="230" stroke="#ef4444" stroke-width="2"/>
      <rect x="8" y="40" width="24" height="170" fill="#ef4444"/>
    </g>
    <!-- candle 5: red up bigger -->
    <g transform="translate(240,0)">
      <line x1="20" y1="-30" x2="20" y2="210" stroke="#ef4444" stroke-width="2"/>
      <rect x="8" y="-10" width="24" height="190" fill="#ef4444"/>
    </g>
    <!-- candle 6: red up biggest -->
    <g transform="translate(300,0)">
      <line x1="20" y1="-80" x2="20" y2="180" stroke="#ef4444" stroke-width="2"/>
      <rect x="8" y="-60" width="24" height="210" fill="#ef4444"/>
    </g>
    <!-- MA line suggesting uptrend -->
    <path d="M 20,160 Q 170,120 320,40" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.9"/>
    <circle cx="20" cy="160" r="4" fill="#06b6d4"/>
    <circle cx="320" cy="40" r="4" fill="#06b6d4"/>
  </g>

  <!-- cyan accent bar -->
  <rect x="80" y="140" width="5" height="70" fill="#06b6d4"/>

  <!-- Main title -->
  <text x="105" y="200"
        font-family="Noto Sans TC, PingFang TC, sans-serif"
        font-size="72"
        font-weight="700"
        fill="#e2e8f0">千張大戶持股追蹤器</text>

  <!-- Subtitle -->
  <text x="105" y="258"
        font-family="Noto Sans TC, PingFang TC, sans-serif"
        font-size="30"
        fill="#8899b5">台股大股東週增持 × 族群 K 線 · 免費工具</text>

  <!-- Feature badges -->
  <g transform="translate(105, 320)">
    <rect x="0" y="0" width="190" height="48" rx="6" fill="#0f1623" stroke="#1e2d4a" stroke-width="1"/>
    <text x="95" y="31" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="18" font-weight="600" fill="#06b6d4">📊 TDCC 集保資料</text>

    <rect x="210" y="0" width="170" height="48" rx="6" fill="#0f1623" stroke="#1e2d4a" stroke-width="1"/>
    <text x="295" y="31" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="18" font-weight="600" fill="#a78bfa">📈 族群 K 線</text>

    <rect x="395" y="0" width="160" height="48" rx="6" fill="#0f1623" stroke="#1e2d4a" stroke-width="1"/>
    <text x="475" y="31" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="18" font-weight="600" fill="#10b981">🎁 完全免費</text>
  </g>

  <!-- bottom meta -->
  <text x="105" y="540"
        font-family="Noto Sans TC, sans-serif"
        font-size="20"
        fill="#4a5568">每週自動更新 · 大戶週增持 ≥ 0.1%</text>
  <text x="105" y="575"
        font-family="JetBrains Mono, monospace"
        font-size="22"
        font-weight="600"
        fill="#06b6d4">taiwan-stock-scanner.pages.dev</text>
</svg>
