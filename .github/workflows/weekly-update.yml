name: 台股資料自動更新

on:
  push:
    branches:
      - master
  schedule:
    # 週六 04:00 UTC = 台灣時間 12:00（完整更新）
    - cron: '0 4 * * 6'
    # 週六 10:00 UTC = 台灣時間 18:00（補跑，若資料未更新）
    - cron: '0 10 * * 6'
    # 週一到週五 07:37 UTC ≈ 台灣時間 15:37（每日 K 線主排程）
    # 說明：
    # - 用 07:37 避開整點，GitHub Actions 整點時段 runner 擁擠易延遲 30~90 分
    # - 15:37 TW 是收盤後 127 分鐘，Yahoo Finance 此時已有完整當日資料
    - cron: '37 7 * * 1-5'
    # 週一到週五 08:37 UTC ≈ 台灣時間 16:37（保險排程 1）
    # 若 14:37 抓到 Yahoo 還沒 data 或 CI 失敗，這次補上
    - cron: '37 8 * * 1-5'
    # 週一到週五 10:37 UTC ≈ 台灣時間 18:37（保險排程 2）
    # 最終保險，確保晚上使用者打開都能看到當日資料
    - cron: '37 10 * * 1-5'
    # 每月 1-10 號 06:43 UTC ≈ 台灣時間 14:43（完整 pipeline 以更新月營收 YoY）
    - cron: '43 6 1-10 * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests beautifulsoup4 lxml

      # 手動觸發（workflow_dispatch）→ 永遠走 full path，讓 run_pipeline.py 內部
      # 的 smart check 自己判斷要做什麼（全部最新就直接跳過、只 K 線過期就只跑 K 線）
      # 排程觸發 → 用日期判斷（跟原本一樣，週六/每月 1-10 號跑 full，平日跑 klines）
      - name: 判斷執行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            DOW=$(date +%u)
            DOM=$(date +%-d)
            if [ "$DOW" = "6" ] || [ "$DOM" -le 10 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=klines" >> $GITHUB_OUTPUT
            fi
          fi

      # 注意：不加 --force；script 內部會 smart check 自行判斷要不要做
      - name: 完整 pipeline（週六 / 每月 1-10 號 / 手動觸發）
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/run_pipeline.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: K 線更新（週一至五）
        if: steps.mode.outputs.mode == 'klines'
        run: python scripts/update_klines.py

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安裝前端套件
        run: |
          cd frontend
          npm install

      - name: 修正執行權限
        run: chmod -R +x frontend/node_modules/.bin/

      - name: 建置前端
        run: |
          cd frontend
          npm run build

      - name: 複製資料到 dist
        run: |
          mkdir -p frontend/dist/data
          cp frontend/public/data/stocks.json frontend/dist/data/stocks.json
          cp frontend/public/data/klines.json frontend/dist/data/klines.json

      - name: 部署到 Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAIWAN_STOCK_SCANNER }}
          channelId: live
          projectId: taiwan-stock-scanner

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=taiwan-stock-scanner --branch=master --commit-dirty=true
