name: 台股資料自動更新

on:
  schedule:
    # 週六 04:00 UTC = 台灣時間 12:00（完整更新）
    - cron: '0 4 * * 6'
    # 週六 10:00 UTC = 台灣時間 18:00（補跑，若資料未更新）
    - cron: '0 10 * * 6'
    # 週一到週五 06:00 UTC = 台灣時間 14:00（每日 K 線更新）
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests beautifulsoup4 lxml

      - name: 判斷執行模式
        id: mode
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "6" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=klines" >> $GITHUB_OUTPUT
          fi

      - name: 完整更新（週六，含自動偵測）
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/run_pipeline.py

      - name: 每日 K 線更新（週一至週五）
        if: steps.mode.outputs.mode == 'klines'
        run: python scripts/update_klines.py

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安裝前端套件
        run: |
          cd frontend
          npm install

      - name: 修正執行權限
        run: chmod -R +x frontend/node_modules/.bin/

      - name: 建置前端
        run: |
          cd frontend
          npm run build

      - name: 複製資料到 dist
        run: |
          mkdir -p frontend/dist/data
          cp frontend/public/data/stocks.json frontend/dist/data/stocks.json
          cp frontend/public/data/klines.json frontend/dist/data/klines.json

      - name: 部署到 Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAIWAN_STOCK_SCANNER }}
          channelId: live
          projectId: taiwan-stock-scanner
