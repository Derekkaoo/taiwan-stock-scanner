name: 台股資料自動更新

# 此 workflow **只負責資料抓取**，不做 deploy。
# 抓完資料 → bot commit + push 到 master → 觸發 deploy.yml（負責 build + deploy）
# 拆分理由：避免使用者 push code 改動時也跑全套資料抓取（每次浪費 5-10 分鐘 + FinMind quota）

on:
  schedule:
    # === 每週六（神秘金字塔大戶 publish 日）===
    # 週六 03:30 UTC = 台灣時間 11:30（神秘金字塔 publish 後 1 小時）
    - cron: '30 3 * * 6'
    # 週六 04:00 UTC = 台灣時間 12:00（11:30 失敗時的備援）
    - cron: '0 4 * * 6'
    # 週六 10:00 UTC = 台灣時間 18:00（補跑，Telegram 去重）
    - cron: '0 10 * * 6'

    # === 平日 11:30（給「假日 Friday」偵測用）===
    # 正常平日 update_klines smart-skip 秒過；假日 Fri 時 IS_PUBLISH_DAY=1 → 抓大戶
    - cron: '30 3 * * 1-5'

    # === 月營收 / 季財報補抓 ===
    # 每月 1-10 號 13:00 UTC = 台灣時間 21:00（月營收 YoY incremental）
    - cron: '0 13 1-10 * *'
    # 每月 15 號 13:00 UTC = 台灣時間 21:00（季財報補抓）
    - cron: '0 13 15 * *'

    # === Q1-Q4 季報公布期限 +1 天 03:00 TW（金管會規定的最後公告日）===
    # Q4 / 年報：3/31 期限 → 4/1 03:00 TW = 3/31 19:00 UTC
    - cron: '0 19 31 3 *'
    # Q1：5/15 期限 → 5/16 03:00 TW = 5/15 19:00 UTC
    - cron: '0 19 15 5 *'
    # Q2：8/14 期限 → 8/15 03:00 TW = 8/14 19:00 UTC
    - cron: '0 19 14 8 *'
    # Q3：11/14 期限 → 11/15 03:00 TW = 11/14 19:00 UTC
    - cron: '0 19 14 11 *'

  workflow_dispatch:

# 同時間只跑一個，避免 cron 觸發跟手動 dispatch race
concurrency:
  group: weekly-update-${{ github.ref }}
  cancel-in-progress: false

# 明確聲明 GITHUB_TOKEN 需要寫入權限 + 觸發其他 workflow 的權限
permissions:
  contents: write
  actions: write   # 給結尾 dispatch deploy.yml 用

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # ref: master + fetch-depth 0：拿完整歷史，rebase / sync feature 才不會出怪事
      - name: 取得程式碼
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests beautifulsoup4 lxml cloudscraper holidays

      # 手動觸發（workflow_dispatch）→ 永遠走 full path
      # 排程觸發 → 用日期判斷
      # 額外規則：「昨天交易 + 今天非交易」(holiday Friday 等) → 視為 norway publish day
      - name: 判斷執行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            DOW=$(date +%u)
            DOM=$(date +%-d)
            IS_PUBLISH_DAY=$(PYTHONPATH=scripts python3 -c 'from datetime import datetime, timedelta; from trading_calendar import is_trading_day; n=datetime.utcnow()+timedelta(hours=8); t=n.date(); y=t-timedelta(days=1); print("1" if (is_trading_day(y) and not is_trading_day(t)) else "0")')
            if [ "$DOW" = "6" ] || [ "$DOM" -le 10 ] || [ "$IS_PUBLISH_DAY" = "1" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            elif [ "$DOM" = "15" ]; then
              echo "mode=financials" >> $GITHUB_OUTPUT
            else
              echo "mode=klines" >> $GITHUB_OUTPUT
            fi
          fi

      # 注意：不加 --force；script 內部會 smart check 自行判斷要不要做
      - name: 完整 pipeline（週六 / 每月 1-10 號 / 手動觸發）
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/run_pipeline.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 季財報補抓（每月 15 號）
        if: steps.mode.outputs.mode == 'financials'
        run: python scripts/fetch_financials.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: K 線更新（週一至五）
        if: steps.mode.outputs.mode == 'klines'
        run: python scripts/update_klines.py

      # === 以下每次 cron 跑完都跑（依靠各 script 的 smart-skip 自我判斷）===
      - name: 大盤 TWII（每次都跑，smart-skip）
        run: python scripts/scrape_twii.py

      - name: 三大法人（每次都跑，內建 17:00 hour guard + 90% coverage smart-skip）
        run: python scripts/scrape_institutional.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: 跑 screeners + 推 admin Telegram（去重邏輯內建）
        run: python -m scripts.screeners.runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ⭐ 健檢：跑完所有 fetch step 後驗證資料涵蓋率，不到 85% 推 Telegram alert
      # continue-on-error: true → 不擋 commit，只是 alert
      - name: 資料健檢（fail 時 Telegram alert）
        continue-on-error: true
        run: python scripts/verify_coverage.py --telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # commit 任何資料變動 → bot push 會觸發 deploy.yml 走 build + deploy 流程
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data backend/db/twii.json backend/db/institutional.json backend/db/financials.json backend/db/monthly_revenue.json backend/db/last_telegram_push.json || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "data: cloud auto-update"
          # retry 最多 5 次
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, syncing with origin..."
            git rebase --abort 2>/dev/null || true
            if ! git pull --rebase --strategy-option=theirs --autostash; then
              echo "Rebase 仍有衝突，abort 後 retry"
              git rebase --abort 2>/dev/null || true
            fi
            sleep $((i * 3))
          done
          echo "ERROR: Failed to push after 5 attempts"
          exit 1

      # 同步資料檔到 feature/favorites-v2（讓 preview URL 也吃到最新資料）
      # 只同步「資料檔」目錄，不碰 code（保留 feature 的 telegram / favorites 改動）
      - name: 同步資料到 feature/favorites-v2
        if: success()
        run: |
          git fetch origin feature/favorites-v2:feature/favorites-v2 || {
            echo "feature/favorites-v2 不存在或拉不到，跳過 sync"
            exit 0
          }
          git checkout feature/favorites-v2
          git checkout master -- frontend/public/data backend/db
          git add frontend/public/data backend/db || true
          if git diff --cached --quiet; then
            echo "feature 分支資料檔已是最新，無需同步"
            git checkout master
            exit 0
          fi
          git commit -m "data: sync from master (cloud auto-update)"
          for i in 1 2 3 4 5; do
            if git push origin feature/favorites-v2; then
              echo "Sync push succeeded on attempt $i"
              git checkout master
              exit 0
            fi
            echo "Sync push attempt $i failed, retry after rebase..."
            git pull --rebase --strategy-option=theirs --autostash origin feature/favorites-v2 || true
            sleep $((i * 3))
          done
          echo "WARNING: feature/favorites-v2 sync 失敗 5 次"
          git checkout master

      # 明確觸發 deploy.yml — 因為 bot 用 GITHUB_TOKEN push 的 commit
      # **不會** 自動觸發其他 push-trigger 的 workflow（GitHub 防無限迴圈設計）
      # 這條確保 bot push 完資料後 Cloudflare / Firebase 一定會 deploy 新版
      - name: 觸發 deploy.yml
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'master',
            });
            console.log('✅ deploy.yml dispatched');
