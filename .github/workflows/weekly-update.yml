name: 台股資料自動更新

on:
  push:
    branches:
      - master
  schedule:
    # 週六 04:00 UTC = 台灣時間 12:00（完整更新）
    - cron: '0 4 * * 6'
    # 週六 10:00 UTC = 台灣時間 18:00（補跑，若資料未更新）
    - cron: '0 10 * * 6'
    # 週一到週五 06:37 UTC ≈ 台灣時間 14:37（每日 K 線更新）
    # 說明：
    # - 用 06:37 避開整點，GitHub Actions 整點時段 runner 擁擠易延遲 30~90 分
    # - 14:37 TW 是收盤後 67 分鐘，Yahoo Finance 此時已有當日完整資料
    # - 含 delay 估計實際跑完約 15:00~15:30 TW
    - cron: '37 6 * * 1-5'
    # 每月 1-10 號 06:43 UTC ≈ 台灣時間 14:43（完整 pipeline 以更新月營收 YoY）
    # MOPS 每月 10 號前陸續公告當月營收，這 10 天每天跑一次確保抓到最新
    # 含 delay 估計實際跑完約 15:10~15:40 TW
    - cron: '43 6 1-10 * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests beautifulsoup4 lxml

      - name: 判斷執行模式
        id: mode
        run: |
          DOW=$(date +%u)      # 星期幾 (1-7, Sat=6)
          DOM=$(date +%-d)     # 每月第幾天 (1-31)
          # Saturday 或每月 1-10 號 → 跑完整 pipeline（含月營收重抓）
          # 其他 → 只跑 K 線更新
          if [ "$DOW" = "6" ] || [ "$DOM" -le 10 ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=klines" >> $GITHUB_OUTPUT
          fi

      - name: 完整更新（週六 或 每月 1-10 號）
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/run_pipeline.py --force

      - name: 每日 K 線更新（週一至週五）
        if: steps.mode.outputs.mode == 'klines'
        run: python scripts/update_klines.py

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安裝前端套件
        run: |
          cd frontend
          npm install

      - name: 修正執行權限
        run: chmod -R +x frontend/node_modules/.bin/

      - name: 建置前端
        run: |
          cd frontend
          npm run build

      - name: 複製資料到 dist
        run: |
          mkdir -p frontend/dist/data
          cp frontend/public/data/stocks.json frontend/dist/data/stocks.json
          cp frontend/public/data/klines.json frontend/dist/data/klines.json

      - name: 部署到 Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoT