name: 台股資料自動更新

on:
  push:
    branches:
      - master
  schedule:
    # 週六 04:00 UTC = 台灣時間 12:00（完整更新 + 推 Telegram）
    - cron: '0 4 * * 6'
    # 週六 10:00 UTC = 台灣時間 18:00（補跑，若資料未更新；Telegram 去重）
    - cron: '0 10 * * 6'
    # 週一到週五 07:07 UTC ≈ 台灣時間 15:07（K 線主排程，提早搶在收盤後）
    - cron: '7 7 * * 1-5'
    # 週一到週五 07:37 UTC ≈ 台灣時間 15:37（保險 1）
    - cron: '37 7 * * 1-5'
    # 週一到週五 08:37 UTC ≈ 台灣時間 16:37（保險 2）
    - cron: '37 8 * * 1-5'
    # 週一到週五 09:37 UTC ≈ 台灣時間 17:37（保險 3，新增以對抗 GitHub schedule 不穩）
    - cron: '37 9 * * 1-5'
    # 週一到週五 10:37 UTC ≈ 台灣時間 18:37（保險 4 + 推 Telegram）
    - cron: '37 10 * * 1-5'
    # 每月 1-10 號 06:43 UTC ≈ 台灣時間 14:43（完整 pipeline 以更新月營收 YoY）
    - cron: '43 6 1-10 * *'
    # 每月 15 號 06:43 UTC ≈ 台灣時間 14:43（季財報 + 自結補抓）
    - cron: '43 6 15 * *'
  workflow_dispatch:

# 同分支同時間只跑一個，避免 push 觸發跟 schedule 觸發 race
# cancel-in-progress: false → 後到的排隊，不打斷正在跑的（保護 deploy）
concurrency:
  group: weekly-update-${{ github.ref }}
  cancel-in-progress: false

# 明確聲明 GITHUB_TOKEN 需要寫入權限（不靠 repo 預設值，避免設定 UI 出包）
# contents: write 才能 git push（bot 拉資料變動回 master）
permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 Python 套件
        run: pip install requests beautifulsoup4 lxml

      # 手動觸發（workflow_dispatch）→ 永遠走 full path，讓 run_pipeline.py 內部
      # 的 smart check 自己判斷要做什麼（全部最新就直接跳過、只 K 線過期就只跑 K 線）
      # 排程觸發 → 用日期判斷（週六/每月 1-10 號跑 full、15 號跑 financials-only、平日跑 klines）
      - name: 判斷執行模式
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            DOW=$(date +%u)
            DOM=$(date +%-d)
            if [ "$DOW" = "6" ] || [ "$DOM" -le 10 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            elif [ "$DOM" = "15" ]; then
              echo "mode=financials" >> $GITHUB_OUTPUT
            else
              echo "mode=klines" >> $GITHUB_OUTPUT
            fi
          fi

      # 注意：不加 --force；script 內部會 smart check 自行判斷要不要做
      - name: 完整 pipeline（週六 / 每月 1-10 號 / 手動觸發）
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/run_pipeline.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: 季財報補抓（每月 15 號）
        if: steps.mode.outputs.mode == 'financials'
        run: python scripts/fetch_financials.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: K 線更新（週一至五）
        if: steps.mode.outputs.mode == 'klines'
        run: python scripts/update_klines.py

      # === 以下是新增的：每次 cron 跑完都跑 ===
      - name: 大盤 TWII（每次都跑，smart-skip）
        run: python scripts/scrape_twii.py

      - name: 三大法人（每次都跑，smart-skip + 寫 buy streak）
        run: python scripts/scrape_institutional.py
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: 跑 screeners + 推 Telegram（去重邏輯內建）
        run: python -m scripts.screeners.runner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # commit 任何資料變動（給後面 deploy 用）
      # 加 retry：避免跟其他 workflow / 本地 push race condition 時 silent fail
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data backend/db/twii.json backend/db/institutional.json backend/db/financials.json backend/db/last_telegram_push.json || true
          if git diff --cached --quiet; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "data: cloud auto-update"
          # retry 最多 5 次，每次失敗 pull --rebase 再 push
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, rebasing and retrying..."
            git pull --rebase --autostash || true
            sleep $((i * 3))
          done
          echo "ERROR: Failed to push after 5 attempts"
          exit 1

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安裝前端套件
        run: |
          cd frontend
          npm install

      - name: 修正執行權限
        run: chmod -R +x frontend/node_modules/.bin/

      - name: 建置前端
        run: |
          cd frontend
          npm run build

      - name: 複製資料到 dist
        run: |
          mkdir -p frontend/dist/data
          cp frontend/public/data/stocks.json frontend/dist/data/stocks.json
          cp frontend/public/data/klines.json frontend/dist/data/klines.json

      - name: 部署到 Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TAIWAN_STOCK_SCANNER }}
          channelId: live
          projectId: taiwan-stock-scanner

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=taiwan-stock-scanner --branch=master --commit-dirty=true
